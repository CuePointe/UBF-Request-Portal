<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>UBF Procurement Portal</title>
  
  <!-- BOOTSTRAP & ICONS (Required for your layout) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  
  <!-- YOUR CUSTOM CSS (We will create style.css next) -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg ubf-navbar shadow-sm">
  <div class="container-fluid px-4">
    <a class="navbar-brand d-flex align-items-center gap-2" href="#">
      <img id="ubfLogoNav" src="logo.png" class="ubf-logo" alt="UBF">
      <div class="d-none d-md-block">
        <div class="ubf-brand-name">Uganda Biodiversity Fund</div>
        <div class="ubf-brand-tag">Procurement Portal</div>
      </div>
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navC">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navC">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
        <li class="nav-item">
          <a class="nav-link ubf-nav-link active" href="#" onclick="showView('dashboard');return false;">
            <i class="bi bi-speedometer2 me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item" id="newRequestTab" style="display:block"> <!-- Set to block for testing -->
          <a class="nav-link ubf-nav-link" href="#" onclick="showView('form');return false;">
            <i class="bi bi-plus-circle me-1"></i>New Request
          </a>
        </li>
        <li class="nav-item" id="historyTab" style="display:block"> <!-- Set to block for testing -->
          <a class="nav-link ubf-nav-link" href="#" onclick="showView('history');return false;">
            <i class="bi bi-clock-history me-1"></i>My History
          </a>
        </li>
        <li class="nav-item ms-lg-3">
          <span class="ubf-role-badge"><i class="bi bi-person-badge me-1"></i><span id="roleLabel">Guest</span></span>
        </li>
        <li class="nav-item ms-lg-2">
          <span class="ubf-user-email"><i class="bi bi-person-circle me-1"></i><span id="emailLabel">—</span></span>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- HERO -->
<div class="ubf-hero-strip">
  <div class="container-fluid px-4 py-2 d-flex align-items-center gap-3">
    <div class="ubf-hero-icon" id="heroIcon"><i class="bi bi-grid-3x3-gap-fill"></i></div>
    <div>
      <div class="ubf-hero-title" id="heroTitle">UBF Logistics</div>
      <div class="ubf-hero-sub" id="heroSub">Procurement Management System</div>
    </div>
  </div>
</div>

<!-- MAIN CONTENT AREA -->
<div class="container-fluid px-4 py-4">
  
  <div id="loadingSpinner" class="text-center py-5 d-none">
    <div class="spinner-border text-primary" style="width:3rem;height:3rem;"></div>
    <p class="mt-3 text-muted fw-semibold">Processing...</p>
  </div>

  <!-- These sections will be filled by our scripts later -->
  <div id="dashboardView" class="view-section">
    <!-- Dashboard content will go here -->
    <h3>Welcome to the Dashboard</h3>
  </div>

  <div id="formView" class="view-section d-none">
    <!-- Form content will go here -->
    <h3>New Procurement Request</h3>
  </div>

  <div id="historyView" class="view-section d-none">
    <div id="historyTableContainer"></div>
  </div>

  <!-- NOTIFICATIONS -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999">
    <div id="appToast" class="toast align-items-center border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body fw-semibold" id="toastMsg">—</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>
</div>

<!-- BOOTSTRAP JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- YOUR CUSTOM JS (We will create script.js later) -->
<script src="script.js"></script>

</body>
</html>
